<!-- @startingPoint section="Storefront" subtitle="Full ecommerce storefront — home, collection, product detail & cart" viewport="1280x820" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T8 Fitness — Storefront</title>
<link rel="icon" href="../../assets/favicon.ico">
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--bg-page); }
  .t8-root { display: flex; flex-direction: column; min-height: 100vh; }
  .t8-main { flex: 1; }
  a { color: inherit; }
</style>
</head>
<body class="t8">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>

<script src="data.js"></script>
<script type="text/babel" data-presets="env,react" src="Parts.jsx"></script>
<script type="text/babel" data-presets="env,react" src="Home.jsx"></script>
<script type="text/babel" data-presets="env,react" src="Collection.jsx"></script>
<script type="text/babel" data-presets="env,react" src="Product.jsx"></script>
<script type="text/babel" data-presets="env,react" src="CartDrawer.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { Header, Footer, Home, Collection, Product, CartDrawer } = window;

function App() {
  const [route, setRoute] = React.useState({ name: 'home', id: null });
  const [cart, setCart] = React.useState([]);
  const [cartOpen, setCartOpen] = React.useState(false);

  const go = (name, id = null) => { setRoute({ name, id }); window.scrollTo(0, 0); };

  const addToCart = (p, qty = 1) => {
    setCart((c) => {
      const ex = c.find((i) => i.id === p.id);
      if (ex) return c.map((i) => i.id === p.id ? { ...i, qty: i.qty + qty } : i);
      return [...c, { ...p, qty }];
    });
    setCartOpen(true);
  };
  const setQty = (id, q) => setCart((c) => c.map((i) => i.id === id ? { ...i, qty: q } : i));
  const removeItem = (id) => setCart((c) => c.filter((i) => i.id !== id));
  const cartCount = cart.reduce((s, i) => s + i.qty, 0);

  return (
    <div className="t8-root">
      <Header route={route.name} go={go} cartCount={cartCount} onCart={() => setCartOpen(true)} onSearch={() => go('collection')} />
      <main className="t8-main">
        {route.name === 'home' && <Home go={go} addToCart={addToCart} />}
        {route.name === 'collection' && <Collection go={go} addToCart={addToCart} />}
        {route.name === 'product' && <Product id={route.id} go={go} addToCart={addToCart} />}
      </main>
      <Footer />
      <CartDrawer open={cartOpen} items={cart} onClose={() => setCartOpen(false)} setQty={setQty} removeItem={removeItem} go={go} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
