<!-- @dsCard group="Colors" viewport="700x150" name="Brand Blue" subtitle="Heritage T8 Blue, evolved into a precise 11-step scale. 700 is core." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--bg-surface); padding: 20px; }
  .row { display:flex; gap:0; border-radius: var(--radius-md); overflow:hidden; box-shadow: var(--shadow-sm); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .sw span { font-family: var(--font-mono); font-size:10px; letter-spacing:.04em; }
  .sw small { font-family: var(--font-mono); font-size:9px; opacity:.7; }
  .lt { color: var(--ink-700); } .dk { color: #fff; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw lt" style="background:var(--blue-50)"><span>50</span></div>
    <div class="sw lt" style="background:var(--blue-100)"><span>100</span></div>
    <div class="sw lt" style="background:var(--blue-200)"><span>200</span></div>
    <div class="sw lt" style="background:var(--blue-300)"><span>300</span></div>
    <div class="sw dk" style="background:var(--blue-400)"><span>400</span></div>
    <div class="sw dk" style="background:var(--blue-500)"><span>500</span></div>
    <div class="sw dk" style="background:var(--blue-600)"><span>600</span></div>
    <div class="sw dk" style="background:var(--blue-700)"><span>700</span><small>#134f8a</small></div>
    <div class="sw dk" style="background:var(--blue-800)"><span>800</span></div>
    <div class="sw dk" style="background:var(--blue-900)"><span>900</span></div>
    <div class="sw dk" style="background:var(--blue-950)"><span>950</span></div>
  </div>
</body>
</html>
