<!-- @dsCard group="Brand" viewport="700x200" name="The T8 Monogram" subtitle="Heritage mark, cleaned & recolored. Navy on light, white on dark." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--bg-surface); padding: 0; }
  .row { display:flex; height:200px; }
  .cell { flex:1; display:flex; align-items:center; justify-content:center; position:relative; }
  .cell img { height:84px; }
  .tag { position:absolute; bottom:10px; left:0; right:0; text-align:center; font-family:var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell" style="background:#fff"><img src="../assets/logos/t8-mark-navy.png" alt="T8 mark navy"><span class="tag" style="color:var(--text-muted)">Navy / light</span></div>
    <div class="cell" style="background:var(--sand-100)"><img src="../assets/logos/t8-mark-navy.png" alt="T8 mark on sand"><span class="tag" style="color:var(--text-muted)">Navy / sand</span></div>
    <div class="cell" style="background:var(--blue-950)"><img src="../assets/logos/t8-mark-white.png" alt="T8 mark white"><span class="tag" style="color:rgba(255,255,255,.6)">White / ink</span></div>
    <div class="cell" style="background:var(--coral-500)"><img src="../assets/logos/t8-mark-white.png" alt="T8 mark on coral"><span class="tag" style="color:rgba(255,255,255,.75)">White / coral</span></div>
  </div>
</body>
</html>
