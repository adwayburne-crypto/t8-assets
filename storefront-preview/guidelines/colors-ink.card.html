<!-- @dsCard group="Colors" viewport="700x150" name="Ink & Slate Neutrals" subtitle="Cool slate scale for text, lines and UI structure." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--bg-surface); padding: 20px; }
  .row { display:flex; gap:0; border-radius: var(--radius-md); overflow:hidden; box-shadow: var(--shadow-sm); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .sw span { font-family: var(--font-mono); font-size:10px; letter-spacing:.04em; }
  .lt { color: var(--ink-700); } .dk { color: #fff; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw lt" style="background:var(--ink-50);box-shadow:inset 0 0 0 1px var(--ink-100)"><span>50</span></div>
    <div class="sw lt" style="background:var(--ink-100)"><span>100</span></div>
    <div class="sw lt" style="background:var(--ink-200)"><span>200</span></div>
    <div class="sw lt" style="background:var(--ink-300)"><span>300</span></div>
    <div class="sw lt" style="background:var(--ink-400)"><span>400</span></div>
    <div class="sw dk" style="background:var(--ink-500)"><span>500</span></div>
    <div class="sw dk" style="background:var(--ink-600)"><span>600</span></div>
    <div class="sw dk" style="background:var(--ink-700)"><span>700</span></div>
    <div class="sw dk" style="background:var(--ink-800)"><span>800</span></div>
    <div class="sw dk" style="background:var(--ink-900)"><span>900</span></div>
    <div class="sw dk" style="background:var(--ink-950)"><span>950</span></div>
  </div>
</body>
</html>
