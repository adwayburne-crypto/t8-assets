<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--bg-surface); padding: 24px; }
  .big { font-family: var(--font-display); font-weight: 800; font-size: 60px; line-height: .98;
         letter-spacing: -0.03em; color: var(--text-primary); }
  .big em { color: var(--blue-700); font-style: italic; }
  .meta { margin-top: 14px; font-family: var(--font-mono); font-size: 11px; letter-spacing:.1em;
          text-transform: uppercase; color: var(--text-muted); display:flex; gap:18px; }
</style>
</head>
<body>
  <div class="big">Built to <em>last</em></div>
  <div class="meta"><span>Archivo</span><span>800 · Black</span><span>tracking −3%</span></div>
</body>
</html>
