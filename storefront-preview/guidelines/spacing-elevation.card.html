<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Cool, low, layered shadows — xs through xl." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--sand-50); padding: 28px; }
  .row { display:flex; gap:26px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .box { width:90px; height:64px; background:#fff; border-radius: var(--radius-md); }
  .item span { font-family: var(--font-mono); font-size:10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span>xs</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span>sm</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span>md</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span>lg</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span>xl</span></div>
  </div>
</body>
</html>
