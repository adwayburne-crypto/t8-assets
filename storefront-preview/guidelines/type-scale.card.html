<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="Display heading steps from 5xl to base." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--bg-surface); padding: 24px; color: var(--text-primary); }
  .line { display:flex; align-items:baseline; gap:16px; padding:6px 0; border-bottom:1px solid var(--border-subtle); }
  .line:last-child { border-bottom:0; }
  .tag { font-family: var(--font-mono); font-size:10px; color: var(--text-muted); width:64px; flex:none; letter-spacing:.06em; }
  .s { font-family: var(--font-display); font-weight:700; letter-spacing:-0.02em; line-height:1.05; }
</style>
</head>
<body>
  <div class="line"><span class="tag">5xl/62</span><span class="s" style="font-size:46px">Reformers</span></div>
  <div class="line"><span class="tag">3xl/38</span><span class="s" style="font-size:34px">Studio-grade build</span></div>
  <div class="line"><span class="tag">2xl/30</span><span class="s" style="font-size:28px">Built for studios &amp; home</span></div>
  <div class="line"><span class="tag">xl/24</span><span class="s" style="font-size:24px">Align-Pilates collection</span></div>
  <div class="line"><span class="tag">lg/20</span><span class="s" style="font-size:20px">Free Hong Kong delivery</span></div>
</body>
</html>
