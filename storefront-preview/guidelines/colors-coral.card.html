<!-- @dsCard group="Colors" viewport="700x150" name="Signal Coral" subtitle="Action, energy, sale & CTA. 500 is core accent." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--bg-surface); padding: 20px; }
  .row { display:flex; gap:0; border-radius: var(--radius-md); overflow:hidden; box-shadow: var(--shadow-sm); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .sw span { font-family: var(--font-mono); font-size:10px; letter-spacing:.04em; }
  .sw small { font-family: var(--font-mono); font-size:9px; opacity:.75; }
  .lt { color: var(--coral-900); } .dk { color: #fff; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw lt" style="background:var(--coral-50)"><span>50</span></div>
    <div class="sw lt" style="background:var(--coral-100)"><span>100</span></div>
    <div class="sw lt" style="background:var(--coral-200)"><span>200</span></div>
    <div class="sw lt" style="background:var(--coral-300)"><span>300</span></div>
    <div class="sw lt" style="background:var(--coral-400)"><span>400</span></div>
    <div class="sw dk" style="background:var(--coral-500)"><span>500</span><small>#f15a36</small></div>
    <div class="sw dk" style="background:var(--coral-600)"><span>600</span></div>
    <div class="sw dk" style="background:var(--coral-700)"><span>700</span></div>
    <div class="sw dk" style="background:var(--coral-800)"><span>800</span></div>
    <div class="sw dk" style="background:var(--coral-900)"><span>900</span></div>
  </div>
</body>
</html>
