<!-- @dsCard group="Brand" viewport="700x280" name="Product Imagery" subtitle="Two registers: clean studio cut-outs (catalogue) + lifestyle (hero)." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--bg-surface); padding: 20px; }
  .grid { display:grid; grid-template-columns: 1fr 1fr 1.4fr; gap: 14px; }
  figure { margin:0; }
  .frame { aspect-ratio: 1/1; border-radius: var(--radius-md); overflow:hidden; background: var(--white); border:1px solid var(--border-subtle); }
  .frame.life { aspect-ratio: auto; height: 100%; }
  .frame img { width:100%; height:100%; display:block; object-fit: contain; padding: 8%; box-sizing:border-box; }
  .frame.life img { object-fit: cover; padding: 0; }
  figcaption { font-family: var(--font-mono); font-size:10px; letter-spacing:.06em; color: var(--text-muted); margin-top:8px; text-transform:uppercase; }
</style>
</head>
<body>
  <div class="grid">
    <figure><div class="frame"><img src="../assets/products/a8-pro.jpg" alt=""></div><figcaption>Studio cut-out · white · contain</figcaption></figure>
    <figure><div class="frame"><img src="../assets/products/ladder-barrel.jpg" alt=""></div><figcaption>Catalogue · centred · margin</figcaption></figure>
    <figure><div class="frame life"><img src="../assets/products/c8-noir.jpg" alt=""></div><figcaption>Lifestyle · in-studio · cover</figcaption></figure>
  </div>
</body>
</html>
