<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--bg-surface); padding: 28px; }
  .lockup { display:inline-flex; align-items:center; gap:14px; }
  .lockup img { height:54px; display:block; }
  .word { font-family: var(--font-display); font-style: italic; font-weight: 700;
          font-size: 52px; letter-spacing:-0.03em; color: var(--blue-700); line-height:1; }
  .stack { display:flex; flex-direction:column; align-items:flex-start; }
  .tagline { margin-top:6px; font-family: var(--font-mono); font-size:11px; letter-spacing:.22em;
             text-transform: uppercase; color: var(--coral-600); padding-left:2px; }
  .note { margin-top:22px; font-family: var(--font-mono); font-size:11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="stack">
    <div class="lockup">
      <img src="../assets/logos/t8-mark-navy.png" alt="T8">
      <span class="word">fitness</span>
    </div>
    <div class="tagline">Home of Align-Pilates · Hong Kong</div>
  </div>
  <div class="note">Heritage monogram retained · "fitness" re-set in Archivo Italic 700 · do not lock the Align-Pilates tagline to this mark</div>
</body>
</html>
