<!-- @dsCard group="Components" viewport="700x520" name="Commerce — Product Card, Price, Rating" subtitle="Storefront tile composing badge, rating, price & action." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--bg-page); padding: 28px; color: var(--text-primary); }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing:.14em; text-transform:uppercase; color: var(--text-muted); margin: 0 0 14px; }
  .grid { display:grid; grid-template-columns: repeat(2, 280px); gap: 20px; }
  .strip { display:flex; gap:32px; align-items:center; margin-top:26px; flex-wrap:wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { ProductCard, PriceTag, Rating } = window.T8FitnessDesignSystem_ce2827;
function Demo(){
  return (
    <div className="t8-root">
      <div className="lbl">Product cards</div>
      <div className="grid">
        <ProductCard category="Reformer" title="Align A8-Pro Reformer" price={18900} compareAt={21500}
          image="../../assets/products/a8-pro.jpg" fit="contain"
          badge={{label:'Sale −12%', tone:'accent'}} rating={4.5} reviews={32} />
        <ProductCard category="Reformer" title="C8-Pro — Noir / Black" price={27800}
          image="../../assets/products/c8-noir.jpg" fit="cover"
          badge={{label:'New', tone:'brand'}} rating={5} reviews={11} />
      </div>
      <div className="lbl" style={{marginTop:26}}>Price &amp; rating</div>
      <div className="strip">
        <PriceTag amount={8990} compareAt={10990} size="xl" />
        <PriceTag amount={15400} size="lg" />
        <Rating value={4.5} count={28} size={20} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
