<!-- @dsCard group="Components" viewport="700x420" name="Forms — Input, Select, Checkbox, Stepper" subtitle="Field controls with focus, error & quantity states." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; font-family: var(--font-sans); background: var(--bg-surface); padding: 28px; color: var(--text-primary); }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 22px 28px; max-width: 640px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing:.14em; text-transform:uppercase; color: var(--text-muted); margin: 6px 0 12px; }
  .row { display:flex; gap:18px; align-items:center; flex-wrap:wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Input, Select, Checkbox, QuantityStepper } = window.T8FitnessDesignSystem_ce2827;
function Demo(){
  return (
    <div className="t8-root">
      <div className="grid">
        <Input label="Email address" placeholder="you@studio.com" defaultValue="" />
        <Input label="Promo code" placeholder="VIP10" trailing={<span style={{fontFamily:'var(--font-mono)',fontSize:12}}>APPLY</span>} />
        <Input label="Phone" defaultValue="+852 9123" error="Enter a valid Hong Kong number" />
        <Select label="Sort by" options={['Featured','Price: low to high','Price: high to low','Newest']} />
      </div>
      <div className="lbl" style={{marginTop:24}}>Checkbox &amp; quantity</div>
      <div className="row">
        <Checkbox label="In stock only" defaultChecked />
        <Checkbox label="On sale" />
        <Checkbox label="Pre-order" disabled />
        <QuantityStepper defaultValue={2} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
